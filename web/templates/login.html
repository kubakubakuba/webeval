{% extends "base.html" %}

{% block title %}
Login
{% endblock title %}

{% block content %}
	<style>
		.back-link {
			display: inline-flex;
			align-items: center;
			margin-bottom: 20px;
			color: var(--link-color);
			text-decoration: none;
		}

		.back-link:hover {
			text-decoration: underline;
		}
	</style>

	<a href="/" class="back-link">
		<svg width="20" height="20" style="vertical-align: middle; margin-right: 5px;">
			<use href="/static/sprites.svg#back"></use>
		</svg>
		Back to Home
	</a>

	<div class="card">
		<div class="card-body">
			<form method="post" id="loginForm">
				<div class="form-group">
					<label for="username">Username:</label>
					<input type="text" id="username" name="username" class="form-control" required>
				</div>
				<div class="form-group">
					<label for="password">Password:</label>
					<input type="password" id="password" name="password" class="form-control" required>
				</div>
				<div class="row">
					<div class="col-sm-6">
						<div class="card card-btn mx-auto mt-4" onclick="document.getElementById('loginForm').submit();">
							<div class="card-body text-center">
								Login
							</div>
						</div>
					</div>
					<div class="col-sm-6">
						<div class="card card-btn mx-auto mt-4" onclick="location.href='/reset';">
							<div class="card-body text-center">
								Forgot Password
							</div>
						</div>
					</div>
				</div>
			</form>
			
			<!-- SSO Login Option -->
			<div class="text-center mt-4">
				<hr style="margin: 2rem 0;">
				<p style="margin-bottom: 1rem;">Or sign in with:</p>
				<div class="card card-btn mx-auto" onclick="location.href='/sso/login';" style="max-width: 300px;">
					<div class="card-body text-center">
						<strong>CTU FEE SSO</strong>
					</div>
				</div>
			</div>
		</div>
	</div>
{% endblock content %}
